name: Bug 反馈
title: "[Bug]: "
description: 提交 Bug 反馈以帮助我们改进代码
labels: ["bug"]
body:
  - type: checkboxes
    id: ensure
    attributes:
      label: 确认项
      description: 请确认以下选项
      options:
        - label: 问题的标题明确
          required: true
        - label: 我翻阅过其他的 issue 并且找不到类似的问题
          required: true
        - label: 我已经尝试过在最新的代码中修复这个问题
          required: false

  - type: input
    id: env-minecraft-ver
    attributes:
      label: Minecraft 版本
      description: 填写运行该 Mod 的 Minecraft 版本
      placeholder: e.g. 1.21.1
    validations:
      required: true

  - type: input
    id: env-mod-ver
    attributes:
      label: Mod 版本
      description: 填写该 Mod 版本
      placeholder: e.g. 2.3.0
    validations:
      required: true

  - type: input
    id: env-fabric-api-ver
    attributes:
      label: Fabric API 版本
      description: 填写使用的 Fabric API 版本
      placeholder: e.g. 0.83.0
    validations:
      required: true

  - type: textarea
    id: describe
    attributes:
      label: 描述问题
      description: 清晰简洁地说明问题是什么
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 提供能复现此问题的详细操作步骤
      placeholder: |
        1. 首先……
        2. 然后……
        3. 发生……
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望的结果
      description: 清晰简洁地描述你期望发生的事情

  - type: textarea
    id: logs
    attributes:
      label: 截图或日志
      description: 提供有助于诊断问题的任何日志和截图

  - type: textarea
    id: config
    attributes:
      label: Mod 配置项
      description: Mod 配置项 (如果你的配置文件中包含敏感信息，请自行删除)
      render: dotenv
      placeholder: |
        # e.g.
        # KEY=VALUE
        # KEY2=VALUE2