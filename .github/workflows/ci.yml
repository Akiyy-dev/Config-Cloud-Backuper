# =============================================================================
# CI — 代码检查与构建
# =============================================================================
# 在 push / pull_request 到 main/master 时触发，执行 Gradle 构建。
# =============================================================================

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      # ---- 检出代码 ----
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- 设置 JDK 21（Minecraft 1.21.1 构建要求） ----
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      # ---- 缓存 Gradle 依赖和构建缓存 ----
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            fabric/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('fabric/**/*.gradle*', 'fabric/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ---- 赋予 Gradle Wrapper 执行权限 ----
      - name: Grant execute permission for Gradle wrapper
        run: chmod +x fabric/gradlew

      # ---- 构建 Fabric 模组 ----
      - name: Build with Gradle
        run: ./gradlew build
        working-directory: fabric

      # ---- 上传构建产物（用于后续调试） ----
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: fabric/build/libs/
          if-no-files-found: warn
