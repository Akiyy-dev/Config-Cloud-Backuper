# =============================================================================
# Release — 发布构建与 Assets 上传
# =============================================================================
# 在 GitHub Release 发布时触发，构建 Fabric 模组并将 JAR 上传到 Release Assets。
# 仅当 Release tag 符合 v*.*.* 格式（如 v1.0.0、v2.3.1）时执行。
# =============================================================================

name: Release

on:
  release:
    types: [published]

permissions:
  contents: write  # 上传 Release Assets 所需权限

jobs:
  build-and-upload:
    name: Build & Upload to Release
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest

    steps:
      # ---- 检出代码 ----
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- 设置 JDK 17（项目实际使用的 Java 版本） ----
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # ---- 缓存 Gradle 依赖和构建缓存 ----
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            fabric/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('fabric/**/*.gradle*', 'fabric/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ---- 赋予 Gradle Wrapper 执行权限 ----
      - name: Grant execute permission for Gradle wrapper
        run: chmod +x fabric/gradlew

      # ---- 构建 Fabric 模组 ----
      - name: Build with Gradle
        run: ./gradlew build
        working-directory: fabric

      # ---- 收集 JAR 文件（排除 sources 和 javadoc） ----
      - name: Collect JAR artifacts
        id: collect-jars
        shell: bash
        run: |
          # 查找所有非 sources、非 javadoc 的 JAR 文件
          JARS=$(find fabric/build/libs/ -name '*.jar' \
            ! -name '*sources*' \
            ! -name '*javadoc*' \
            -type f)
          echo "Found JARs:"
          echo "$JARS"
          
          # 复制到临时目录
          mkdir -p /tmp/release-assets
          while IFS= read -r jar; do
            cp "$jar" /tmp/release-assets/
          done <<< "$JARS"
          
          echo "dir=/tmp/release-assets" >> "$GITHUB_OUTPUT"

      # ---- 上传 JAR 到 Release Assets ----
      - name: Upload JARs to Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/release-assets/*.jar
          tag_name: ${{ github.event.release.tag_name }}
          name: ${{ github.event.release.name }}
          body: ${{ github.event.release.body }}
          draft: false
          prerelease: ${{ github.event.release.prerelease }}
