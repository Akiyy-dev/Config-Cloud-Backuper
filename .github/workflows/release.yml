# =============================================================================
# Release — 发布构建、Assets 上传与平台分发
# =============================================================================
# 在 GitHub Release 发布时触发，构建 Fabric 模组并：
# 1) 上传 JAR 到 GitHub Release Assets
# 2) 自动发布到 Modrinth 与 CurseForge
# 仅当 Release tag 符合 v*.*.* 格式（如 v1.0.0、v2.3.1）时执行。
# =============================================================================

name: Release

on:
  release:
    types: [published]

permissions:
  contents: write  # 上传 Release Assets 所需权限

jobs:
  build-and-upload:
    name: Build & Upload to Release
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest

    steps:
      # ---- 检出代码 ----
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- 设置 JDK 21（Minecraft 1.21.1 构建要求） ----
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      # ---- 缓存 Gradle 依赖和构建缓存 ----
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            fabric/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('fabric/**/*.gradle*', 'fabric/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ---- 赋予 Gradle Wrapper 执行权限 ----
      - name: Grant execute permission for Gradle wrapper
        run: chmod +x fabric/gradlew

      # ---- 构建 Fabric 模组 ----
      - name: Build with Gradle
        run: ./gradlew build
        working-directory: fabric

      # ---- 收集 JAR 文件（排除 sources 和 javadoc） ----
      - name: Collect JAR artifacts
        id: collect-jars
        shell: bash
        run: |
          # 查找所有非 sources、非 javadoc 的 JAR 文件
          JARS=$(find fabric/build/libs/ -name '*.jar' \
            ! -name '*sources*' \
            ! -name '*javadoc*' \
            -type f)
          echo "Found JARs:"
          echo "$JARS"
          
          # 复制到临时目录
          mkdir -p /tmp/release-assets
          while IFS= read -r jar; do
            cp "$jar" /tmp/release-assets/
          done <<< "$JARS"
          
          echo "dir=/tmp/release-assets" >> "$GITHUB_OUTPUT"

      # ---- 上传 JAR 到 Release Assets ----
      - name: Upload JARs to Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/release-assets/*.jar
          tag_name: ${{ github.event.release.tag_name }}
          name: ${{ github.event.release.name }}
          body: ${{ github.event.release.body }}
          draft: false
          prerelease: ${{ github.event.release.prerelease }}

      # ---- 自动发布到 Modrinth / CurseForge ----
      # 需要预先配置：
      # - Secrets: MODRINTH_TOKEN, CURSEFORGE_TOKEN
      # - Variables: MODRINTH_PROJECT_ID, CURSEFORGE_PROJECT_ID
      - name: Publish to Modrinth and CurseForge
        id: publish
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: /tmp/release-assets/*.jar
          name: ${{ github.event.release.name }}
          version: ${{ github.event.release.tag_name }}
          changelog: ${{ github.event.release.body }}

          loaders: fabric
          game-versions: 1.21.1
          modrinth-game-versions: |
            1.21.1
          curseforge-game-versions: |
            1.21.1
          java: |
            21

          version-type: ${{ github.event.release.prerelease && 'beta' || 'release' }}
          retry-attempts: 3

      # mc-publish 尚不支持单独设置 CurseForge「客户端/服务端」环境。
      # Modrinth 后台「Environment」里「客户端和服务端，两端均安装最佳」对应 v2 API：client_side + server_side 均为 optional
      #（与 fabric.mod.json 的 environment: "*" 一致：单端可运行，双端安装体验最佳）。
      # 若必须「仅客户端」或「仅服务端」，请改为 unsupported/optional 等组合；若强制双端安装则两侧改为 required。
      - name: Set Modrinth project client/server metadata (API)
        if: ${{ vars.MODRINTH_PROJECT_ID != '' }}
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
        run: |
          if [ -z "${MODRINTH_TOKEN}" ]; then
            echo "MODRINTH_TOKEN not set; skip Modrinth project metadata patch."
            exit 0
          fi
          curl -fsS -X PATCH "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}" \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Akiyy-dev/Config-Cloud-Backuper/${{ github.event.release.tag_name }} (GitHub Actions)" \
            -d '{"client_side":"optional","server_side":"optional"}'
